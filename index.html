}

/* Hindi font */
body.hindi {

/* Marathi font */

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        .dark ::-webkit-scrollbar-thumb {
            background: #475569;
        }

        /* Map Container */
        #map {
            height: 100%;
            width: 100%;
            z-index: 1;
        }

        /* Glassmorphism */
        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
        }
        .dark .glass {
            background: rgba(30, 41, 59, 0.7);
        }

        /* Animations */
        .fade-in {
            animation: fadeIn 0.5s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .slide-in {
            animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn {
            from { transform: translateX(-100%); }
            to { transform: translateX(0); }
        }

        /* Loader */
        .loader {
            border: 3px solid #f3f3f3;
            border-radius: 50%;
            border-top: 3px solid #0f766e;
            width: 24px;
            height: 24px;
            -webkit-animation: spin 1s linear infinite; /* Safari */
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        // --- AUTHENTICATION ---
        function fillLogin(email, pass) {
            document.getElementById('login-email').value = email;
            document.getElementById('login-pass').value = pass;
        }

        function handleLogin(e) {

            e.preventDefault();

            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-pass').value;
            const role = document.getElementById('role-select').value;
            const lang = document.getElementById('login-lang').value;

            if (users[email] && users[email].pass === pass) {

                state.currentUser = { email, ...users[email] };

                // Apply selected language
                state.language = lang;
                localStorage.setItem('lang', lang);

                document.getElementById('lang-select').value = lang;

                changeLanguage(lang);

                enterDashboard();

            } else {
                alert("Invalid Credentials");
            }

            }

            state.currentUser = null;
            document.getElementById('dashboard').classList.add('hidden');
            document.getElementById('login-screen').classList.remove('hidden');
        }

        function enterDashboard() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            
            // Setup UI
            document.getElementById('user-name').innerText = state.currentUser.name;
            document.getElementById('user-avatar').innerText = state.currentUser.name.charAt(0);
            document.getElementById('user-role-badge').innerText = state.currentUser.role.toUpperCase();

            navigate('dashboard'); // Default view

                    { id: 'map', icon: 'fa-map-location-dot', label: 'live_map' },

                    { id: 'map', icon: 'fa-map', label: 'live_map' },
                    { id: 'profile', icon: 'fa-user', label: 'profile' }

            items.forEach(item => {
                const btn = document.createElement('button');
                btn.className = `w-full flex items-center px-4 py-3 text-sm font-medium rounded-lg transition-colors mb-1 ${state.currentView === item.id ? 'bg-teal-50 text-teal-700 dark:bg-teal-900/30 dark:text-teal-300' : 'text-gray-600 dark:text-gray-400 hover:bg-gray-50 dark:hover:bg-slate-700'}`;
                btn.onclick = () => navigate(item.id);
                btn.innerHTML = `<i class="fa-solid ${item.icon} w-6 text-center mr-2"></i> <span data-i18n="${item.label}">${i18n[state.language][item.label]}</span>`;
                nav.appendChild(btn);
            });
            
            updateTranslations();
        }

        function navigate(view) {
            state.currentView = view;
            renderSidebar(); // Update active state
            
            const content = document.getElementById('content-area');
            const title = document.getElementById('page-title');
            content.innerHTML = ''; // Clear content

            // Render specific view
            switch(view) {
                case 'dashboard':
                    if (state.currentUser.role === 'citizen') renderCitizenDashboard(content);
                    else if (state.currentUser.role === 'admin') renderAdminDashboard(content);
                    else renderContractorDashboard(content);
                    break;
                case 'report':
                    renderReportForm(content);
                    title.innerText = i18n[state.language].report_damage;
                    break;
                case 'track':
                case 'complaints':
                    renderComplaintsList(content);
                    title.innerText = i18n[state.language].track_complaints || i18n[state.language].view_complaints;
                    break;
                case 'map':
                    renderMapView(content);

                    break;
                case 'discussion':

                    title.innerText = i18n[state.language].discussion;

                case 'profile':

                    title.innerText = i18n[state.language].profile;

                default:

                                <h4 class="font-bold text-gray-800 dark:text-white mb-3 text-sm">Trending Topics</h4>
                                <ul class="space-y-2 text-sm text-gray-600 dark:text-gray-400">

            `;
            setTimeout(translateAllPosts, 500);
        }

        // --- UTILITIES & HELPERS ---

        function getStatusColor(status) {
            switch(status) {
                case 'Reported': return 'bg-gray-100 text-gray-800 dark:bg-gray-700 dark:text-gray-300';
                case 'Verified': return 'bg-blue-100 text-blue-800 dark:bg-blue-900 dark:text-blue-300';
                case 'In Progress': return 'bg-yellow-100 text-yellow-800 dark:bg-yellow-900 dark:text-yellow-300';
                case 'Resolved': return 'bg-green-100 text-green-800 dark:bg-green-900 dark:text-green-300';
                default: return 'bg-gray-100 text-gray-800';
            }
        }

        function toggleTheme() {
            const html = document.documentElement;
            const icon = document.getElementById('theme-icon');
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                localStorage.setItem('theme', 'light');
                icon.classList.replace('fa-sun', 'fa-moon');
            } else {
                html.classList.add('dark');
                localStorage.setItem('theme', 'dark');
                icon.classList.replace('fa-moon', 'fa-sun');
            }
        }

        function changeLanguage(lang) {

            state.language = lang;
            localStorage.setItem('lang', lang);

            // Change font based on language
            document.body.classList.remove('hindi','marathi');

            if(lang === "hi"){
                document.body.classList.add("hindi");
            }

            if(lang === "mr"){
                document.body.classList.add("marathi");
            }

            updateTranslations();
            renderSidebar();
            navigate(state.currentView);   // re-render current view
        }

        function updateTranslations() {

            const elements = document.querySelectorAll('[data-i18n]');

            elements.forEach(el => {
                const key = el.getAttribute('data-i18n');

                if (i18n[state.language][key]) {
                    el.innerText = i18n[state.language][key];
                }
            });

            // -------- AUTO TRANSLATE COMMON TEXT --------

            const dictionary = {
                "Total Reports": "total_reports",
                "In Progress": "in_progress",
                "Resolved": "resolved",
                "Recent Reports": "recent_reports",
                "Location": "location",
                "Date": "date",
                "Report Road Damage": "report_damage",
                "Description": "description",
                "Submit Report": "submit",
                "Damage Type": "description",
                "Upload Image": "submit"
            };

            Object.keys(dictionary).forEach(text => {

                document.querySelectorAll("*").forEach(el => {

                    if(el.childNodes.length === 1 && el.textContent.trim() === text){

                        const key = dictionary[text];

                        if(i18n[state.language][key]){
                            el.textContent = i18n[state.language][key];
                        }

                    }

                });

            });

            }

        // --- ACTIONS ---

        function getLocation() {
            const input = document.getElementById('gps-input');
            input.value = "Locating...";
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((position) => {
                    input.value = `${position.coords.latitude.toFixed(4)}, ${position.coords.longitude.toFixed(4)}`;
                }, () => {
                    input.value = "17.6605, 75.9064 (Solapur)"; // Fallback
                });
            } else {
                input.value = "Geolocation not supported";
            }
        }

        function submitComplaint(e) {
            e.preventDefault();
            const id = 'CMP-' + Math.floor(Math.random() * 1000);
            const newComplaint = {
                id: id,
                type: 'Pothole',
                location: 'Current Location',
                severity: 'Medium',
                status: 'Reported',
                date: new Date().toISOString().split('T')[0],
                lat: 17.6605,
                lng: 75.9064,
                reporter: state.currentUser.email,
                image: 'https://placehold.co/600x400/333/fff?text=New+Report'
            };
            state.complaints.unshift(newComplaint);
            alert(`Complaint Submitted Successfully! ID: ${id}`);
            navigate('track');
        }

        function updateStatus(id, newStatus) {
            const c = state.complaints.find(x => x.id === id);
            if(c) c.status = newStatus;
            renderComplaintsList(document.getElementById('content-area'));
        }

        function markComplete(id) {
            updateStatus(id, 'Resolved');
            alert('Task marked as completed. Awaiting admin verification.');
            navigate('dashboard');
        }

        // --- CHATBOT LOGIC ---
        let chatOpen = false;
        function toggleChat() {
            const win = document.getElementById('chat-window');
            chatOpen = !chatOpen;
            if(chatOpen) {
                win.classList.remove('hidden');
                setTimeout(() => {
                    win.classList.remove('scale-95', 'opacity-0');
                    win.classList.add('scale-100', 'opacity-100');
                }, 10);
            } else {
                win.classList.remove('scale-100', 'opacity-100');
                win.classList.add('scale-95', 'opacity-0');
                setTimeout(() => win.classList.add('hidden'), 300);
            }
        }

        function handleChatKey(e) {
            if(e.key === 'Enter') sendChatMessage();
        }

        function sendChatMessage() {
            const input = document.getElementById('chat-input');
            const msg = input.value.trim();
            if(!msg) return;

            addMessage(msg, 'user');
            input.value = '';

            // Bot Logic
            setTimeout(() => {
                let reply = "I'm sorry, I didn't understand that. Try asking about 'road status' or 'complaint ID'.";
                const lower = msg.toLowerCase();
                
                if(lower.includes('hello') || lower.includes('hi')) reply = "Hello! How can I assist you with Margakshat today?";
                else if(lower.includes('status')) reply = "You can track your complaint status in the 'Track Complaints' section.";
                else if(lower.includes('pothole')) reply = "To report a pothole, please use the 'Report Damage' form in your dashboard.";
                else if(lower.includes('contact') || lower.includes('phone')) reply = "You can reach SMC at 0217-1234567 or email help@margakshat.com";
                else if(lower.includes('emergency')) reply = "For emergencies, dial 100 (Police) or 108 (Ambulance).";
                
                // Multilingual simple support
                if(state.language === 'hi') {
                    if(lower.includes('status')) reply = "आप 'Track Complaints' अनुभाग में अपनी शिकायत की स्थिति देख सकते हैं।";
                } else if (state.language === 'mr') {
                    if(lower.includes('status')) reply = "तुम्ही 'Track Complaints' विभागात तक्रारीची स्थिती तपासू शकता.";
                }

                addMessage(reply, 'bot');
            }, 1000);
        }

        function addMessage(text, sender) {
            const container = document.getElementById('chat-messages');
            const div = document.createElement('div');
            div.className = `flex items-start ${sender === 'user' ? 'justify-end' : ''}`;
            
            const bubble = document.createElement('div');
            bubble.className = `rounded-lg py-2 px-3 max-w-[85%] text-sm ${sender === 'user' ? 'bg-teal-600 text-white rounded-br-none' : 'bg-gray-200 dark:bg-slate-700 text-gray-800 dark:text-gray-200 rounded-bl-none'}`;
            bubble.innerText = text;
            
            div.appendChild(bubble);
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        // --- VOICE API ---
        function startVoiceDescription() {
            if (!('webkitSpeechRecognition' in window)) {
                alert("Voice recognition not supported in this browser.");
                return;
            }
            const recognition = new webkitSpeechRecognition();
            recognition.lang = state.language === 'en' ? 'en-IN' : (state.language === 'hi' ? 'hi-IN' : 'mr-IN');
            recognition.start();
            
            const input = document.getElementById('desc-input');
            input.placeholder = "Listening...";

            recognition.onresult = function(event) {
                const transcript = event.results[0][0].transcript;
                input.value += (input.value ? ' ' : '') + transcript;
                input.placeholder = "Describe the issue...";
            };

            recognition.onerror = function() {
                input.placeholder = "Error. Try again.";
            };
        }

        function startVoiceInput() {
             if (!('webkitSpeechRecognition' in window)) {
                alert("Voice recognition not supported.");
                return;
            }
            const recognition = new webkitSpeechRecognition();
            recognition.lang = 'en-IN';
            recognition.start();
            
            recognition.onresult = function(event) {
                document.getElementById('chat-input').value = event.results[0][0].transcript;
                sendChatMessage();
            };
        }
        async function translateText(text, targetLang) {

            const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=${targetLang}&dt=t&q=${encodeURIComponent(text)}`;

            const res = await fetch(url);
            const data = await res.json();

            return data[0][0][0];
        }

        async function translateAllPosts(){

            if(state.language === "en") return;

            for(const post of state.posts){

                const el = document.getElementById(`post-${post.id}`);

                if(!el) continue;

                const translated = await translateText(post.content, state.language);

                el.innerText = translated;
            }

        }
        async function translateComplaints(){

            if(state.language === "en") return;

            for(const c of state.complaints){

                const typeEl = document.getElementById(`type-${c.id}`);
                const locEl = document.getElementById(`loc-${c.id}`);

                if(typeEl){
                    const translatedType = await translateText(c.type, state.language);
                    typeEl.innerText = translatedType;
                }

                if(locEl){
                    const translatedLoc = await translateText(c.location, state.language);
                    locEl.innerText = translatedLoc;
                }

            }

            }

    </script>

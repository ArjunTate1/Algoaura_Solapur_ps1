<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Margakshat · Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=DM+Mono:wght@400;500&display=swap"/>
  <style>
    :root {
      --bg:       #0f1117;
      --surface:  #181c27;
      --border:   rgba(255,255,255,0.08);
      --accent:   #f97316;
      --accent2:  #0ea5e9;
      --text:     #f1f5f9;
      --muted:    #64748b;
      --error:    #f87171;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(249,115,22,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(249,115,22,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    /* Glow blobs */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      opacity: 0.18;
      animation: drift 12s ease-in-out infinite alternate;
    }
    .blob-1 { width: 400px; height: 400px; background: var(--accent);  top: -100px; left: -100px; animation-delay: 0s; }
    .blob-2 { width: 300px; height: 300px; background: var(--accent2); bottom: -80px; right: -80px; animation-delay: -4s; }
    @keyframes drift { from { transform: translate(0,0); } to { transform: translate(30px,20px); } }

    /* Card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px 44px;
      width: 100%;
      max-width: 420px;
      position: relative;
      z-index: 10;
      animation: fadeUp 0.5s ease both;
    }
    @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }

    /* Logo */
    .logo-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
    }
    .logo-mark {
      width: 42px; height: 42px;
      background: var(--accent);
      border-radius: 10px;
      display: grid;
      place-items: center;
      font-size: 20px;
      flex-shrink: 0;
    }
    .logo-text { display: flex; flex-direction: column; line-height: 1.1; }
    .logo-name {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 20px;
      letter-spacing: -0.5px;
    }
    .logo-sub {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-top: 2px;
    }

    h2 {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 22px;
      margin-bottom: 6px;
      letter-spacing: -0.3px;
    }
    .subtitle {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 28px;
      line-height: 1.5;
    }

    /* Form */
    .field { margin-bottom: 16px; }
    label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
      margin-bottom: 7px;
    }
    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 12px 14px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }
    input[type="text"]:focus,
    input[type="password"]:focus {
      border-color: var(--accent);
      background: rgba(249,115,22,0.05);
    }
    input::placeholder { color: var(--muted); font-size: 13px; }

    /* Submit */
    .btn {
      width: 100%;
      padding: 13px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 15px;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.2s, transform 0.15s;
      letter-spacing: 0.3px;
    }
    .btn:hover   { opacity: 0.9; }
    .btn:active  { transform: scale(0.98); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Error */
    .error-box {
      background: rgba(248,113,113,0.1);
      border: 1px solid rgba(248,113,113,0.3);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 12px;
      color: var(--error);
      margin-bottom: 16px;
      display: none;
      align-items: center;
      gap: 8px;
    }
    .error-box.show { display: flex; }

    /* Role pills */
    .role-pills {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }
    .role-pill {
      flex: 1;
      padding: 8px 6px;
      border-radius: 10px;
      border: 1.5px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      text-align: center;
      transition: all 0.18s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    .role-pill .pill-icon { font-size: 18px; line-height: 1; }
    .role-pill:hover        { border-color: rgba(249,115,22,0.5); color: var(--text); }
    .role-pill.active       { border-color: var(--accent); background: rgba(249,115,22,0.12); color: var(--accent); }

    .hint {
      margin-top: 20px;
      font-size: 11px;
      color: var(--muted);
      text-align: center;
      line-height: 1.6;
    }
    .hint span { color: var(--accent); font-family: 'DM Mono', monospace; }

    /* Loading spinner inside button */
    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2.5px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>

<div class="card">
  <div class="logo-row">
    <div class="logo-mark">🛣️</div>
    <div class="logo-text">
      <div class="logo-name">Margakshat</div>
      <div class="logo-sub">Solapur Municipal Corporation</div>
    </div>
  </div>

  <h2>Welcome back</h2>
  <p class="subtitle">Sign in to access your dashboard</p>

  <!-- Quick role hint pills (visual only) -->
  <div class="role-pills">
    <div class="role-pill active" id="pill-user"       onclick="selectPill('user')">
      <span class="pill-icon">👤</span>User
    </div>
    <div class="role-pill" id="pill-admin"      onclick="selectPill('admin')">
      <span class="pill-icon">🛡️</span>Admin
    </div>
    <div class="role-pill" id="pill-contractor" onclick="selectPill('contractor')">
      <span class="pill-icon">🔧</span>Contractor
    </div>
  </div>

  <div class="error-box" id="error-box">
    ⚠️ <span id="error-msg">Invalid username or password</span>
  </div>

  <div class="field">
    <label for="username">Username</label>
    <input type="text" id="username" placeholder="Enter your username" autocomplete="username"/>
  </div>

  <div class="field">
    <label for="password">Password</label>
    <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password"/>
  </div>

  <button class="btn" id="login-btn" onclick="doLogin()">Sign In</button>

  <div class="hint">
    Test accounts &nbsp;·&nbsp;
    <span>user1</span> / <span>admin1</span> / <span>contractor1</span><br/>
    Password: same as username + <span>123</span>
  </div>
</div>

<script>
  let selectedPill = 'user';

  function selectPill(role) {
    selectedPill = role;
    document.querySelectorAll('.role-pill').forEach(p => p.classList.remove('active'));
    document.getElementById('pill-' + role).classList.add('active');
    // Pre-fill username hint
    document.getElementById('username').placeholder = role + '1';
  }

  // Allow Enter key to submit
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });

  async function doLogin() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value.trim();
    const btn      = document.getElementById('login-btn');
    const errorBox = document.getElementById('error-box');

    if (!username || !password) {
      showError('Please enter both username and password.');
      return;
    }

    // Loading state
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Signing in…';
    errorBox.classList.remove('show');

    try {
      const res = await fetch('http://127.0.0.1:8000/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });

      if (!res.ok) {
        const data = await res.json();
        showError(data.detail || 'Invalid credentials.');
        return;
      }

      const data = await res.json();

      // Save session info
      localStorage.setItem('mg_user', JSON.stringify({
        username: data.username,
        role: data.role
      }));

      // Redirect by role
      const routes = {
        admin:      'admin.html',
        contractor: 'contractor.html',
        user:       'user.html'
      };

      const dest = routes[data.role] || 'user.html';
      btn.innerHTML = '✓ Redirecting…';
      setTimeout(() => { window.location.href = dest; }, 500);

    } catch (err) {
      showError('Cannot connect to server. Is the backend running?');
    } finally {
      btn.disabled = false;
      if (btn.innerHTML.includes('Signing')) btn.innerHTML = 'Sign In';
    }
  }

  function showError(msg) {
    const box = document.getElementById('error-box');
    document.getElementById('error-msg').textContent = msg;
    box.classList.add('show');
    document.getElementById('login-btn').disabled  = false;
    document.getElementById('login-btn').innerHTML = 'Sign In';
  }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Margakshat · AI Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap"/>
  <style>
    :root {
      --bg:      #0f1117;
      --surface: #181c27;
      --card:    #1e2333;
      --border:  rgba(255,255,255,0.08);
      --accent:  #f97316;
      --info:    #0ea5e9;
      --ok:      #22c55e;
      --danger:  #ef4444;
      --text:    #f1f5f9;
      --muted:   #64748b;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    .chat-header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 18px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    .bot-avatar { width: 38px; height: 38px; background: linear-gradient(135deg, var(--info), #6366f1); border-radius: 10px; display: grid; place-items: center; font-size: 20px; flex-shrink: 0; }
    .bot-name   { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 15px; }
    .bot-status { font-size: 11px; color: var(--ok); display: flex; align-items: center; gap: 5px; }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--ok); animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .clear-btn  { margin-left: auto; padding: 6px 12px; border-radius: 8px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 11px; cursor: pointer; transition: all 0.15s; }
    .clear-btn:hover { border-color: var(--danger); color: var(--danger); }

    .messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 14px; }
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .msg { display: flex; gap: 10px; align-items: flex-end; max-width: 88%; }
    .msg.user { flex-direction: row-reverse; align-self: flex-end; }
    .msg.bot  { align-self: flex-start; }
    .msg-avatar { width: 30px; height: 30px; border-radius: 8px; display: grid; place-items: center; font-size: 15px; flex-shrink: 0; }
    .msg.bot  .msg-avatar { background: linear-gradient(135deg, var(--info), #6366f1); }
    .msg.user .msg-avatar { background: var(--accent); }
    .msg-bubble { padding: 11px 14px; border-radius: 14px; font-size: 13px; line-height: 1.6; max-width: 100%; word-break: break-word; }
    .msg.bot  .msg-bubble { background: var(--card); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
    .msg.user .msg-bubble { background: var(--accent); color: #fff; border-bottom-right-radius: 4px; }
    .msg-time { font-size: 9px; color: var(--muted); margin-top: 4px; padding: 0 4px; }
    .msg.user .msg-time { text-align: right; }

    .typing-bubble { background: var(--card); border: 1px solid var(--border); border-radius: 14px; border-bottom-left-radius: 4px; padding: 14px 18px; display: flex; gap: 5px; align-items: center; }
    .typing-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); animation: bounce 1.2s infinite; }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }

    .suggestions { padding: 0 16px 10px; display: flex; gap: 8px; flex-wrap: wrap; flex-shrink: 0; }
    .suggestion-chip { padding: 6px 12px; border-radius: 16px; border: 1px solid var(--border); background: var(--card); color: var(--muted); font-size: 11px; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
    .suggestion-chip:hover { border-color: var(--info); color: var(--info); background: rgba(14,165,233,0.08); }

    .input-area { background: var(--surface); border-top: 1px solid var(--border); padding: 12px 16px; display: flex; gap: 10px; align-items: flex-end; flex-shrink: 0; }
    .input-wrap { flex: 1; background: var(--card); border: 1px solid var(--border); border-radius: 12px; display: flex; align-items: flex-end; padding: 10px 14px; transition: border-color 0.2s; }
    .input-wrap:focus-within { border-color: var(--info); }
    textarea { flex: 1; background: transparent; border: none; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 13px; resize: none; outline: none; max-height: 100px; line-height: 1.5; overflow-y: auto; }
    textarea::placeholder { color: var(--muted); }
    .send-btn { width: 36px; height: 36px; border-radius: 9px; border: none; background: var(--info); color: #fff; font-size: 16px; cursor: pointer; display: grid; place-items: center; flex-shrink: 0; transition: opacity 0.15s, transform 0.1s; }
    .send-btn:hover  { opacity: 0.88; }
    .send-btn:active { transform: scale(0.93); }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .welcome { text-align: center; padding: 32px 20px; color: var(--muted); }
    .welcome-icon  { font-size: 44px; margin-bottom: 12px; }
    .welcome-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 18px; color: var(--text); margin-bottom: 8px; }
    .welcome-sub   { font-size: 13px; line-height: 1.6; }
  </style>
</head>
<body>

<div class="chat-header">
  <div class="bot-avatar">🤖</div>
  <div>
    <div class="bot-name">Margakshat Assistant</div>
    <div class="bot-status"><span class="status-dot"></span> Online · Powered by Llama3</div>
  </div>
  <button class="clear-btn" onclick="clearChat()">🗑 Clear</button>
</div>

<div class="messages" id="messages">
  <div class="welcome" id="welcome">
    <div class="welcome-icon">⚖️</div>
    <div class="welcome-title">Traffic Law & App Assistant</div>
    <div class="welcome-sub">Ask me about Indian traffic laws,<br/>fines, road rules, or how to use Margakshat.</div>
  </div>
</div>

<div class="suggestions" id="suggestions">
  <div class="suggestion-chip" onclick="sendSuggestion(this)">Fine for no helmet?</div>
  <div class="suggestion-chip" onclick="sendSuggestion(this)">How to report a pothole?</div>
  <div class="suggestion-chip" onclick="sendSuggestion(this)">Drunk driving penalty?</div>
  <div class="suggestion-chip" onclick="sendSuggestion(this)">What is pothole severity?</div>
</div>

<div class="input-area">
  <div class="input-wrap">
    <textarea id="chat-input" placeholder="Ask about traffic laws or the app…" rows="1"
      onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
  </div>
  <button class="send-btn" id="send-btn" onclick="sendMessage()">➤</button>
</div>

<script>
let isWaiting = false;

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}
function sendSuggestion(el) {
  document.getElementById('chat-input').value = el.textContent;
  document.getElementById('suggestions').style.display = 'none';
  sendMessage();
}
function now() {
  return new Date().toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });
}
function appendMessage(role, text) {
  document.getElementById('welcome')?.remove();
  const msgs = document.getElementById('messages');
  const wrap = document.createElement('div');
  wrap.className = `msg ${role}`;
  wrap.innerHTML = `
    <div class="msg-avatar">${role === 'bot' ? '🤖' : '👤'}</div>
    <div>
      <div class="msg-bubble">${text}</div>
      <div class="msg-time">${now()}</div>
    </div>`;
  msgs.appendChild(wrap);
  msgs.scrollTop = msgs.scrollHeight;
}
function showTyping() {
  const msgs = document.getElementById('messages');
  const el   = document.createElement('div');
  el.className = 'msg bot'; el.id = 'typing-indicator';
  el.innerHTML = `<div class="msg-avatar">🤖</div><div class="typing-bubble"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>`;
  msgs.appendChild(el);
  msgs.scrollTop = msgs.scrollHeight;
}
function hideTyping() { document.getElementById('typing-indicator')?.remove(); }

async function sendMessage() {
  if (isWaiting) return;
  const input = document.getElementById('chat-input');
  const text  = input.value.trim();
  if (!text) return;
  input.value = ''; input.style.height = 'auto';
  appendMessage('user', text);
  document.getElementById('suggestions').style.display = 'none';
  isWaiting = true;
  document.getElementById('send-btn').disabled = true;
  showTyping();
  try {
    const res  = await fetch('http://127.0.0.1:8000/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text })
    });
    hideTyping();
    if (!res.ok) throw new Error();
    const data = await res.json();
    appendMessage('bot', (data.answer || 'No answer received.').replace(/\n/g, '<br>'));
  } catch {
    hideTyping();
    appendMessage('bot', '❌ Backend not reachable. Make sure uvicorn is running at <code>localhost:8000</code>.');
  } finally {
    isWaiting = false;
    document.getElementById('send-btn').disabled = false;
    document.getElementById('chat-input').focus();
  }
}

function clearChat() {
  document.getElementById('messages').innerHTML = `
    <div class="welcome" id="welcome">
      <div class="welcome-icon">⚖️</div>
      <div class="welcome-title">Traffic Law & App Assistant</div>
      <div class="welcome-sub">Ask me about Indian traffic laws,<br/>fines, road rules, or how to use Margakshat.</div>
    </div>`;
  document.getElementById('suggestions').style.display = 'flex';
}
</script>
</body>
</html>
